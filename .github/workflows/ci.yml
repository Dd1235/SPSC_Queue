name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.cxx }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, cc: gcc,   cxx: g++ }
          - { os: ubuntu-latest, cc: clang, cxx: clang++ }
          - { os: macos-latest,  cc: clang, cxx: clang++ }
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure

  thirdparty-bench:
    name: ubuntu / clang / thirdparty benchmarks
    runs-on: ubuntu-latest
    env: { CC: clang, CXX: clang++ }
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSPSC_BENCH_THIRDPARTY=ON
      - name: Build
        run: cmake --build build -j

  sanitizers:
    name: ubuntu / clang / ${{ matrix.san }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        san: [TSAN, ASAN]
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DSPSC_ENABLE_${{ matrix.san }}=ON -DSPSC_BUILD_BENCHMARKS=OFF
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure

  artifact-integrity:
    name: paper artifact / claims and figures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-paper.txt
      - name: Install pinned analysis dependencies
        run: python -m pip install -r requirements-paper.txt
      - name: Verify committed quantitative claims
        run: python scripts/verify_claims.py
      - name: Smoke-regenerate canonical figures
        run: |
          python scripts/make_plots.py --csv paper/data/matrix_v3.csv --tag ci \
            --assets "${RUNNER_TEMP}/figures" --summary-dir "${RUNNER_TEMP}/data"
          test -s "${RUNNER_TEMP}/figures/fig_oversubscription_ci.pdf"
          test -s "${RUNNER_TEMP}/data/summary_ci.md"
